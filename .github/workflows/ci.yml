name: CI — Lint, Test, Build Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-python:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff>=0.4.0"

      - name: Lint backend and training
        run: ruff check backend/ training/ || echo "Linting issues found but not blocking"

  test-backend:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest httpx

      - name: Show installed versions
        run: pip list | grep -iE "fastapi|pydantic|starlette|anyio|slowapi"

      - name: Test backend import
        run: |
          python -c "
          import sys
          try:
              from backend.app import app, _mfcc_features, _fft_features, _extract_legacy_18_features
              print('All imports OK')
          except Exception:
              import traceback
              traceback.print_exc()
              sys.exit(1)
          "
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run backend unit tests
        run: pytest backend/tests/ -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}

  test-training:
    name: Training Pipeline (smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install training dependencies
        run: |
          pip install --upgrade pip
          pip install -r training/requirements.txt

      - name: Train models from existing CSV
        run: python training/train.py --csv osr_features.csv --output models/
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Print results
        run: |
          if [ -f models/results.json ]; then
            echo "=== Model Results ==="
            python -m json.tool models/results.json
          fi
          ls -lh models/ 2>/dev/null || true

      - name: Regression guard (F1/FPR thresholds)
        run: |
          python scripts/check_model_regression.py \
            --results models/results.json \
            --required-model mfcc_gbm \
            --required-model hybrid_gbm \
            --check-model mfcc_gbm \
            --check-model hybrid_gbm \
            --min-f1 0.80 \
            --max-fpr 0.20

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trained-models-${{ github.run_number }}
          path: |
            models/*.pkl
            models/*.json
          retention-days: 30

  check-frontend:
    name: Frontend Static Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify frontend files exist
        run: |
          test -f frontend/index.html   && echo "OK frontend/index.html"
          test -f frontend/css/main.css && echo "OK frontend/css/main.css"
          test -f frontend/js/app.js    && echo "OK frontend/js/app.js"

      - name: Validate HTML structure
        run: |
          python3 -c "
          with open('frontend/index.html') as f:
              content = f.read()
          assert '<!DOCTYPE html>' in content, 'Missing DOCTYPE'
          assert '<html' in content, 'Missing html tag'
          assert '</html>' in content, 'Missing closing html tag'
          assert 'app.js' in content, 'Missing app.js reference'
          assert 'main.css' in content, 'Missing main.css reference'
          print('HTML validation passed')
          "
