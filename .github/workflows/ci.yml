name: CI — Lint, Test, Build Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-python:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install "ruff>=0.4.0"

      - name: Lint backend and training (warnings only for now)
        run: ruff check backend/ training/ || echo "Linting issues found but not blocking deployment"

      - name: Lint legacy scripts (warnings only, non-blocking)
        run: ruff check pipeline.py server.py train_detector.py || true

  test-backend:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-backend-${{ runner.os }}-3.11-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-backend-${{ runner.os }}-3.11-

      - name: Clear pip cache
        run: pip cache purge || true

      - name: Install backend dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest httpx
          pip list | grep -i "fastapi\|pydantic\|starlette\|anyio"

      - name: Verify backend imports
        run: |
          python -c "import fastapi; print(f'FastAPI {fastapi.__version__}')"
          python -c "import pydantic; print(f'Pydantic {pydantic.__version__}')"
          python -c "import starlette; print(f'Starlette {starlette.__version__}')"
          head -5 backend/app.py
          python -c "
          import sys, traceback
          try:
              from backend.app import app
              print('backend.app imported OK')
          except Exception as e:
              traceback.print_exc()
              sys.exit(1)
          " 2>&1 || true
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run backend unit tests
        run: pytest backend/tests/ -v --tb=long 2>&1 || (echo "--- TESTS FAILED ---" && pytest backend/tests/ -v --tb=long 2>&1 | tail -50 && exit 1)
        env:
          PYTHONPATH: ${{ github.workspace }}

  test-training:
    name: Training Pipeline (smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-training-${{ runner.os }}-3.11-${{ hashFiles('training/requirements.txt') }}
          restore-keys: pip-training-${{ runner.os }}-3.11-

      - name: Clear pip cache
        run: pip cache purge || true

      - name: Install training dependencies
        run: |
          pip install --upgrade pip
          pip install -r training/requirements.txt

      - name: Train models from existing CSV
        run: python training/train.py --csv osr_features.csv --output models/
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Print results table
        run: |
          if [ -f models/results.json ]; then
            echo "=== Model Results ==="
            cat models/results.json
          fi
          ls -lh models/ 2>/dev/null || true

      - name: Upload trained model artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trained-models-${{ github.run_number }}
          path: |
            models/*.pkl
            models/*.json
          retention-days: 30

  check-frontend:
    name: Frontend Static Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify frontend files exist
        run: |
          test -f frontend/index.html   && echo "✓ frontend/index.html"
          test -f frontend/css/main.css && echo "✓ frontend/css/main.css"
          test -f frontend/js/app.js    && echo "✓ frontend/js/app.js"

      - name: Validate HTML structure
        run: |
          python3 -c "
          with open('frontend/index.html') as f:
              content = f.read()
          assert '<!DOCTYPE html>' in content, 'Missing DOCTYPE'
          assert '<html' in content, 'Missing html tag'
          assert '</html>' in content, 'Missing closing html tag'
          assert 'app.js' in content, 'Missing app.js reference'
          assert 'main.css' in content, 'Missing main.css reference'
          print('✓ HTML validation passed')
          "
